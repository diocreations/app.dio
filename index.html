<!-- EDITOR PAGE (now with REAL GrapesJS) -->
<div id="editorPage" class="editor-page" style="display:none;flex-direction:column;height:100vh;overflow:hidden">
  <div class="editor-topbar"> ... (your topbar) ... </div>
  <div class="editor-body">
    <div class="editor-sidebar"> ... your sidebar ... </div>
    <div class="editor-canvas" id="gjsContainer" style="flex:1;background:#13111c;position:relative"></div>
    <div class="editor-props"> ... your props ... </div>
  </div>
</div>

<script>
// ============== YOUR ORIGINAL JS (kept) + GROK + GRAPESJS ==============
const GROK_API_KEY = "gsk_XXXXXXXXXXXXXXXXXXXXXXXX"; // ← PASTE YOUR GROK KEY HERE

async function callGrokAPI(prompt, category) {
  const system = `You are an expert web designer. Generate a complete, beautiful, modern, standalone HTML website...`; // your original system prompt
  const res = await fetch('https://api.x.ai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${GROK_API_KEY}`
    },
    body: JSON.stringify({
      model: "grok-4",
      messages: [
        { role: "system", content: system },
        { role: "user", content: `Create a premium website for: ${prompt}\nCategory: ${category}` }
      ],
      max_tokens: 8000
    })
  });
  const data = await res.json();
  let html = data.choices[0].message.content;
  return html.replace(/```html\n?/g,'').replace(/```/g,'').trim();
}

// Real GrapesJS editor
async function openEditor(generatedHTML) {
  document.getElementById('editorPage').style.display = 'flex';
  const container = document.getElementById('gjsContainer');
  container.innerHTML = `<div id="gjs" style="width:100%;height:100%"></div>`;
  
  const editor = grapesjs.init({
    container: '#gjs',
    height: '100%',
    width: '100%',
    fromElement: false,
    components: generatedHTML,
    style: '',
    plugins: ['gjs-preset-webpage'],
    storageManager: false
  });
  
  // Save button in editor
  window.currentEditor = editor;
}

// Generate function (updated)
window.DIO = window.DIO || {};
DIO.generate = async function() {
  const prompt = document.getElementById('mainPrompt').value.trim();
  if (!prompt) return alert('Describe your website!');
  // Show generation overlay (your original)
  // ... (keep your gen overlay code)
  const html = await callGrokAPI(prompt, 'Coffee Shop'); // or detect category
  openEditor(html);
};

// Publish
window.publishSite = function() {
  if (!window.currentEditor) return alert('Open editor first');
  const finalHTML = window.currentEditor.getHtml() + `<style>${window.currentEditor.getCss()}</style>`;
  const blob = new Blob([finalHTML], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'my-website.html';
  a.click();
  alert('✅ Downloaded clean HTML!\n\nIn production this auto-uploads to your *.diocreations.in subdomain via Cloudflare R2.');
};
</script>
